<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sojmieblo</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="worksSidebar" class="works-sidebar" style="display: none;">
        <div class="works-sidebar-header">
            <h3>Saved Works</h3>
            <button id="sidebarToggleBtn" class="sidebar-toggle-btn" type="button" title="Collapse">></button>
        </div>
        <div id="worksList" class="works-list"></div>
    </div>

    <div class="container">
        <h1>Sojmieblo</h1>
        <p class="subtitle">Turn a selfie into a meme in seconds.</p>

        <button class="debug-toggle" id="debugToggleBtn" type="button">Logs: OFF</button>
        <div class="upload-section" id="uploadSection">
            <input type="file" id="fileInput" accept="image/*" style="display: none;">
            <button class="upload-btn" id="uploadBtn">Upload Photo</button>
            <p class="hint">Or drag and drop an image here</p>
            <p class="hint">Ctrl+V to paste from clipboard</p>
        </div>

        <div class="canvas-container" id="canvasContainer" style="display: none;">
            <canvas id="glCanvas"></canvas>

            <div class="parameters">
                <div class="parameter">
                    <span class="parameter-label">Brush Size (mouse wheel)</span>
                    <span class="parameter-value" id="radiusValue">100</span>
                </div>
                <div class="parameter">
                    <span class="parameter-label">Strength (hold click)</span>
                    <span class="parameter-value" id="strengthValue">0.50</span>
                </div>
            </div>

            <div class="controls">
                <button class="reset-btn" id="resetBtn">Reset</button>
                <button class="save-btn" id="saveBtn">Save</button>
                <button class="change-btn" id="changeBtn">New Photo</button>
            </div>
            <p class="instruction">Hover and hold mouse to deform. Use mouse wheel to change brush size.</p>
        </div>
    </div>

    <div id="workModal" class="modal">
        <div class="modal-content">
            <span class="modal-close" id="modalClose">&times;</span>
            <img id="modalImage" src="" alt="Work">
            <button class="modal-download" id="modalDownload">Download</button>
        </div>
    </div>

    <script src="glfx.js"></script>
    <script src="config.js"></script>
    <script src="imageProcessor.js"></script>
    <script src="workManager.js"></script>
    <script src="app.js"></script>
</body>
</html>
